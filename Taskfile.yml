version: '3'

vars:
  # Rely on PATH for node/npm to ensure cross-platform compatibility (Windows/Linux/Mac)
  NODE: node
  NPM: npm
  WEB_PORT: 9229
  API_PORT: 9339

tasks:
  default:
    cmds:
      - echo "Checking Taskfile... use 'task --list' to see available tasks"

  clean:
    desc: Kill dev processes, clear caches, and build outputs
    cmds:
      - pkill -f "vite|electron|node.*dev" 2>/dev/null || true
      - rm -rf node_modules/.vite dist build-output bin dist-ssr
      - echo "Cleaned caches and build outputs"

  nuke:
    desc: Force-kill any running app processes and deep-clean
    cmds:
      - 'task: clean'
      - cmd: taskkill /F /IM WorkerBee.exe /T
        ignore_error: true
      - cmd: taskkill /F /IM electron.exe /T
        ignore_error: true
      - '{{.NODE}} -e "setTimeout(() => {}, 2000)"'
      - 'task: clean'
    platforms: [windows]

  cleanup:
    desc: Clean up build artifacts and node_modules
    cmds:
      # Use rimraf if available, or try standard rm (might fail on standard CMD)
      - '{{.NPM}} run rimraf -- node_modules dist dist-ssr || rm -rf node_modules dist dist-ssr'
      - echo "Cleanup complete."
    ignore_error: true

  init:
    desc: Initialize project and install dependencies
    cmds:
      - '{{.NPM}} install'
      - echo "Dependencies installed."

  dev:
    desc: Start development server (Backend + Frontend)
    cmds:
      - '{{.NPM}} run dev'
    env:
      WEB_PORT: '{{.WEB_PORT}}'
      API_PORT: '{{.API_PORT}}'

  run:
    desc: Build and run production server
    cmds:
      - '{{.NPM}} run build'
      - '{{.NODE}} server.js'
    env:
      NODE_ENV: production
      WEB_PORT: '{{.WEB_PORT}}'
      API_PORT: '{{.API_PORT}}'

  init_win:
    desc: Install dependencies (including Electron items)
    cmds:
      - '{{.NODE}} -e "if (process.platform !== ''win32'') { console.error(''init_win must be run on Windows.''); process.exit(1) }"'
      - '{{.NPM}} install'
      - npx electron-builder install-app-deps

  pkg_win:
    desc: Package for Windows
    cmds:
      - '{{.NODE}} -e "if (process.platform !== ''win32'') { console.error(''pkg_win must be run on Windows (or a Windows CI runner) because sqlite3 must be rebuilt for win32/Electron.''); process.exit(1) }"'
      - '{{.NPM}} run build'
      - '{{.NPM}} run pack:win'
    env:
      NODE_ENV: production

  pkg_win_cross:
    desc: Attempt a Windows build from Linux/macOS (may fail due to native deps)
    platforms: [linux, darwin]
    cmds:
      - 'echo "Cross-building Windows on {{OS}} requires Windows rebuilds for native deps (sqlite3)."'
      - 'echo "Recommended: run task pkg_win on a Windows machine (or CI Windows runner)."'
      - 'echo "This task does not produce a working Windows build from {{OS}}; it will exit now."'
      - 'false'
    env:
      NODE_ENV: production

  install:
    desc: Install as a systemd service (Linux)
    platforms: [linux]
    cmds:
      - '{{.NPM}} install'
      - '{{.NPM}} run build'
      - sudo sh scripts/install-systemd.sh

  uninstall:
    desc: Uninstall systemd service (keeps /opt/workerbee/data)
    platforms: [linux]
    cmds:
      - sudo sh scripts/uninstall-systemd.sh
